name: Compile Paper

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  pull_request:
    branches: [main]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Tectonic (pinned)
        run: |
          # Tectonic version is PINNED on purpose, for two reasons:
          #   1. Reproducible builds — the same toolchain produces the same PDF.
          #   2. The previous "fetch latest release via GitHub API" approach made an
          #      unauthenticated api.github.com call that got rate-limited and broke
          #      CI (failed run 27837225738, 2026-06-19, exit code 2 in this step).
          # Pinning removes that API call entirely. Old release assets stay
          # downloadable indefinitely, so this URL keeps working.
          # >>> To upgrade the toolchain, bump this version by hand (and only then): <<<
          TECTONIC_VERSION=0.16.9
          curl -sL "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic@${TECTONIC_VERSION}/tectonic-${TECTONIC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz
          sudo mv tectonic /usr/local/bin/
          tectonic --version

      - name: Build paper (PDF + HTML)
        run: |
          cd paper
          make
          make html

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: manuscript
          path: |
            paper/manuscript.pdf
            paper/manuscript.html

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: paper/manuscript.pdf
          generate_release_notes: true
